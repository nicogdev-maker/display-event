<!DOCTYPE html>
<html lang="fr">
	<head>
		<meta charset="UTF-8">
		<meta name="viewport" content="width=device-width, initial-scale=1.0">
		<title>Logos</title>
		<style>
			* {
				margin: 0;
				padding: 0;
				box-sizing: border-box;
			}

			body {
				display: flex;
				justify-content: center;
				align-items: flex-start;
				min-height: 100vh;
				background-color: white;
				font-family: Arial, sans-serif;
				padding-top: 20px;
				background: linear-gradient(to bottom, #fff 45%, rgba(255,255,255,0.1) 100%), url('images/pavillon.jpg') 50% no-repeat;
				background-position: center;
				background-size: cover;

			}

            h1{
                font-size: 3em;
            }
            h2{
                font-size: 2em;
            }

			.logos-container {
				display: grid;
				grid-template-columns: repeat(6, 1fr);
				gap: 30px;
				max-width: 1200px;
				padding: 20px;
				justify-content: center;
			}

			.logo {
				height: 200px;
				display: flex;
				justify-content: center;
				align-items: center;
				background-color: white;

			}
			.container {
				display: flex;
				flex-direction: column;
				align-items: center;
			}

			img {
				/* width: 100%; */
				max-width: 500px;
				height: auto;
			}
		</style>
	</head>
	<body>
		<div class="container">
			<img class="logo" src="images/logo_numeria.png" alt="Campus Numeria">
			<h1>Journée Portes Ouvertes</h1>
            <h2>Mercredi 1er Avril 2026</h2>
		</div>
	</body>
</html>
